<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="connection.css">
</head>

<body>


    <div class="container"><!-- État fermé - Le livre -->
        <div class="book-closed" id="bookClosed">
            <div class="book-title">
                <h1>Mon Livre</h1>
                <p>de Recettes</p>
            </div>
            <div class="book-icon">
                <img src="./assets/img/Gemini_Generated_Image_941pfg941pfg941p.png" alt="">
            </div>
            <div class="click-hint">
                Cliquez pour ouvrir
            </div>
        </div>
    </div><!-- État ouvert - Le formulaire -->
    <div class="book-open" id="bookOpen"><button class="close-btn" id="closeBtn">✕</button>
        <div class="form-container">
            <h2>Bienvenue!</h2>
            <p class="form-subtitle">Entrez vos informations pour commencer</p>
            <form id="welcomeForm">
                <div class="form-group"><label for="email">Email</label> <input type="email" id="email" name="email"
                        placeholder="votre.email@exemple.com" required>
                </div>
                <div class="form-group"><label for="name">Nom</label> <input type="text" id="name" name="name"
                        placeholder="Votre nom" required>
                </div>
                <div class="form-groupe"><label for="passeword">Mot de passe</label> <input type="password"
                        id="passeword" name="passeword" placeholder="Mot de passe" required></div>
                <button type="submit" class="submit-btn">Découvrir mes recettes</button>
                <div class="success-message" id="successMsg">
                    ✓ Bienvenue {name}! Vos recettes vous attendent... 🍳
                </div>
            </form>
        </div>
    </div>



    <script src="./connection.js"></script>
</body>

</html>
